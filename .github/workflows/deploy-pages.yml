name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Cache Quartz plugins
        uses: actions/cache@v4
        with:
          path: .quartz/plugins
          key: ${{ runner.os }}-quartz-plugins-${{ hashFiles('quartz.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-quartz-plugins-

      - run: npm ci

      - name: Install Quartz plugins
        run: npx quartz plugin install

      # Die Explorer-Komponente scrollt das aktive Element via scrollIntoView in
      # den Blick. Mit dem Default (block:"start") scrollt auf tiefen Seiten das
      # GANZE Fenster ~700px nach unten (Seite lädt mitten im Artikel). Wir
      # erzwingen block:"nearest". .quartz/ ist .gitignore't, daher hier in CI
      # nach der Installation patchen (deterministisch, reicht zuverlässig in den Build).
      - name: Patch explorer scroll behavior
        run: |
          for f in .quartz/plugins/explorer/dist/components/index.js .quartz/plugins/explorer/dist/index.js; do
            if [ -f "$f" ]; then
              sed -i 's/scrollIntoView({behavior:"smooth"})/scrollIntoView({behavior:"smooth",block:"nearest"})/g' "$f"
            fi
          done
          grep -rl 'block:"nearest"' .quartz/plugins/explorer/dist/ || (echo "Patch failed" && exit 1)

      - name: Build
        run: npx quartz build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
