# yaml-language-server: $schema=./quartz/plugins/quartz-plugins.schema.json
configuration:
  pageTitle: "Eldara — Das Kompendium"
  pageTitleSuffix: " | Eldara"
  # SPA aus: Vollseiten-Navigation löst relative Links + Alias-Redirects korrekt auf
  # (SPA verlor unter Root-Alias-Redirects den /Eldara-Wiki/-Pfadpräfix → 404). Quartz
  # feuert den nav-Event auch ohne SPA, daher initialisieren alle Komponenten normal.
  enableSPA: false
  enablePopovers: true
  analytics: null
  locale: de-DE
  baseUrl: "stevenschiffmann.github.io/Eldara-Wiki"
  ignorePatterns:
    - private
    - templates
    - .obsidian
    - Kampagnen/DnDHomies/Spieler
    - Kampagnen/MainHomies/Spieler
  theme:
    fontOrigin: googleFonts
    cdnCaching: true
    typography:
      header: "Cinzel Decorative"
      body: "Crimson Text"
      code: "IBM Plex Mono"
    colors:
      # Candlelit Obsidian — warmes dunkles Grimoire (Toggle-Variante, bleibt dunkel
      # & arkan, damit das Erlebnis auf JEDEM System dunkel ist — unabhängig vom
      # System-Theme, ohne Eingriff in installierte Plugins).
      lightMode:
        light: "#14100a"
        lightgray: "#2a2014"
        gray: "#9c8a6a"
        darkgray: "#ece0c8"
        dark: "#f7eccf"
        secondary: "#e0b54a"
        tertiary: "#e2603a"
        highlight: "rgba(224, 181, 74, 0.13)"
        textHighlight: "#e0b54a55"
      # Midnight Obsidian — das arkane Grimoire (Standard-Erlebnis)
      darkMode:
        light: "#0e0b16"
        lightgray: "#241d33"
        gray: "#9a8cc0"
        darkgray: "#ece2c8"
        dark: "#f6ecc9"
        secondary: "#d8b44a"
        tertiary: "#e2603a"
        highlight: "rgba(216, 180, 74, 0.14)"
        textHighlight: "#d8b44a55"
plugins:
  - source: github:quartz-community/created-modified-date
    enabled: true
    options:
      defaultDateType: modified
      priority:
        - frontmatter
        - git
        - filesystem
    order: 10
  - source: github:quartz-community/syntax-highlighting
    enabled: true
    options:
      theme:
        light: github-light
        dark: github-dark
      keepBackground: false
    order: 20
  - source: github:quartz-community/obsidian-flavored-markdown
    enabled: true
    options:
      enableInHtmlEmbed: true
      enableCheckbox: true
    order: 30
  - source: github:quartz-community/github-flavored-markdown
    enabled: true
    order: 40
  - source: github:quartz-community/table-of-contents
    enabled: true
    order: 50
    layout:
      position: right
      priority: 30
  - source: github:quartz-community/crawl-links
    enabled: true
    options:
      # Obsidian-Stil: [[Kristallimplantat]] findet die Datei egal wie tief verschachtelt.
      # "absolute" löste alles nach /Root auf → 404 für verschachtelte Seiten.
      markdownLinkResolution: shortest
    order: 60
  - source: github:quartz-community/description
    enabled: true
    order: 70
  - source: github:quartz-community/latex
    enabled: false
    order: 80
  - source: github:quartz-community/hard-line-breaks
    enabled: false
    order: 90
  - source: github:quartz-community/fonts
    enabled: true
  - source: github:quartz-community/remove-draft
    enabled: true
  - source: github:quartz-community/alias-redirects
    enabled: true
  - source: github:quartz-community/content-index
    enabled: true
    options:
      enableSiteMap: true
      enableRSS: true
  - source: github:quartz-community/favicon
    enabled: true
  - source: github:quartz-community/og-image
    enabled: true
  - source: github:quartz-community/cname
    enabled: false
  - source: github:quartz-community/canvas-page
    enabled: true
  - source: github:quartz-community/content-page
    enabled: true
  - source: github:quartz-community/folder-page
    enabled: true
  - source: github:quartz-community/tag-page
    enabled: true
  - source: github:quartz-community/explorer
    enabled: true
    layout:
      position: left
      priority: 50
  - source: github:quartz-community/graph
    enabled: true
    options:
      # Inline-Graph wird per CSS ausgeblendet (nur Vollbild-Button bleibt). depth 1 hält
      # das versteckte Rendering billig → kein Lag mehr (vorher -1 = Vollnetz pro Seite).
      localGraph:
        depth: 1
        scale: 1.05
        repelForce: 0.5
        centerForce: 0.3
        linkDistance: 30
        fontSize: 0.32
        opacityScale: 1
        showTags: false
        focusOnHover: true
        enableRadial: false
      globalGraph:
        depth: -1
        scale: 0.9
        repelForce: 0.5
        centerForce: 0.3
        linkDistance: 32
        fontSize: 0.42
        opacityScale: 1
        showTags: false
        focusOnHover: true
        enableRadial: true
    layout:
      position: right
      priority: 10
  - source: github:quartz-community/search
    enabled: true
    layout:
      position: left
      priority: 20
      group: toolbar
      groupOptions:
        grow: true
  - source: github:quartz-community/backlinks
    enabled: true
    layout:
      position: right
      priority: 50
  - source: github:quartz-community/article-title
    enabled: true
    layout:
      position: beforeBody
      priority: 10
  - source: github:quartz-community/content-meta
    enabled: true
    layout:
      position: beforeBody
      priority: 20
  - source: github:quartz-community/page-title
    enabled: true
    layout:
      position: left
      priority: 10
  - source: github:quartz-community/darkmode
    enabled: true
    layout:
      position: left
      priority: 30
      group: toolbar
  - source: github:quartz-community/reader-mode
    enabled: true
    layout:
      position: left
      priority: 35
      group: toolbar
  - source: github:quartz-community/breadcrumbs
    enabled: true
    layout:
      position: beforeBody
      priority: 5
      condition: not-index
  - source: github:quartz-community/footer
    enabled: true
    options:
      # Persistente Schnell-Links + Karten-Schnellzugriff auf JEDER Seite (auch mobil).
      # Volle URLs sind subpath-sicher (kein 404 unter /Eldara-Wiki/).
      links:
        "✦ Start": "https://stevenschiffmann.github.io/Eldara-Wiki/"
        "📜 Kampagne": "https://stevenschiffmann.github.io/Eldara-Wiki/kampagnen/dndhomies"
        "👥 Personen": "https://stevenschiffmann.github.io/Eldara-Wiki/personen"
        "🗺 Andurin": "https://stevenschiffmann.github.io/Eldara-Wiki/orte/eldara/andurin/andurin-map"
        "🏙 Kharvos": "https://stevenschiffmann.github.io/Eldara-Wiki/orte/eldara/andurin/kharvos/kharvos-map"
        "🏛 Lighthaven": "https://stevenschiffmann.github.io/Eldara-Wiki/orte/eldara/andurin/lighthaven/lighthaven-map"
  - source: github:quartz-community/recent-notes
    enabled: true
    options:
      title: "Letzte Änderungen"
      limit: 6
      showTags: false
    layout:
      position: right
      priority: 40
  - source: github:quartz-community/spacer
    enabled: true
    options: {}
    order: 25
    layout:
      position: left
      priority: 25
      display: mobile-only
  - source: github:quartz-community/bases-page
    enabled: true
    options: {}
    order: 50
  - source: github:quartz-community/note-properties
    enabled: true
    options:
      includedProperties: []
  - source: github:quartz-community/unlisted-pages
    enabled: true
    options: {}
    order: 45
layout:
  groups:
    toolbar:
      priority: 35
      direction: row
      gap: 0.5rem
  byPageType:
    "404":
      positions:
        beforeBody: []
        left: []
        right: []
    content: {}
    folder:
      exclude:
        - reader-mode
      positions:
        right: []
    tag:
      exclude:
        - reader-mode
      positions:
        right: []
    canvas: {}
    bases: {}
