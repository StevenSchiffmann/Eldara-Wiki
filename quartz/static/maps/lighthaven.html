<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Karte: lighthaven</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
<style>
  html,body{margin:0;height:100%;background:#0b0a12;overflow:hidden;}
  #map{position:absolute;inset:0;background:#0b0a12;cursor:grab;}
  #map:active{cursor:grabbing;}
  .leaflet-container{background:#0b0a12;font-family:inherit;}
  .leaflet-control-zoom a{
    background:#15121f;color:#e8dcc0;border-color:#3a2f1a;
    font-weight:700;text-shadow:0 0 6px rgba(212,175,55,.4);
  }
  .leaflet-control-zoom a:hover{background:#221b30;color:#f3d98a;}
  .leaflet-bar{box-shadow:0 0 0 1px rgba(212,175,55,.25),0 4px 16px rgba(0,0,0,.6);}
  .leaflet-image-layer{ image-rendering:auto; filter:drop-shadow(0 0 24px rgba(212,175,55,.18)); }
  /* Verbindungs-Marker (Portal zu anderer Karte) */
  .eldara-pin{ width:auto!important; height:auto!important; }
  .eldara-pin b{
    display:inline-flex; align-items:center; gap:.35em; white-space:nowrap;
    transform:translate(-50%,-50%);
    padding:.28em .7em; border-radius:999px; cursor:pointer;
    font-family:'Cinzel Decorative',Georgia,serif; font-size:13px; font-weight:700; letter-spacing:.02em;
    color:#f4e6bf; background:linear-gradient(160deg,#2a2138,#171225);
    border:1px solid rgba(216,180,74,.7);
    box-shadow:0 0 0 1px rgba(216,180,74,.25),0 0 14px -2px rgba(216,180,74,.6),0 6px 16px rgba(0,0,0,.6);
    transition:transform .15s ease, box-shadow .15s ease, color .15s ease;
  }
  .eldara-pin b::before{ content:"✦"; color:#e0b54a; }
  .eldara-pin b:hover{ color:#fff; box-shadow:0 0 0 1px rgba(216,180,74,.5),0 0 22px 0 rgba(216,180,74,.85),0 6px 16px rgba(0,0,0,.7); }
  /* Koordinaten-Picker-Overlay */
  #pick{ position:absolute; left:10px; bottom:10px; z-index:1000; display:none;
    font:600 13px/1.4 ui-monospace,monospace; color:#f4e6bf; background:rgba(15,12,22,.92);
    border:1px solid rgba(216,180,74,.5); border-radius:8px; padding:.5em .7em; pointer-events:none; }
</style>
</head>
<body>
<div id="map"></div>
<div id="pick"></div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
<script>
  (function(){
    var bounds = [[0,0],[1024,1536]];
    var markers = [{"label":"← Andurin (Übersicht)","y":930,"x":120,"target":"https://stevenschiffmann.github.io/Eldara-Wiki/orte/eldara/andurin/andurin-map"}];
    var map = L.map('map', { crs: L.CRS.Simple, minZoom: -2, maxZoom: 4, attributionControl: false, zoomControl: true });
    L.imageOverlay('lighthaven.png', bounds).addTo(map);
    map.fitBounds(bounds);
    map.setMaxBounds(bounds);
    var dz = -1;
    if (!isNaN(dz)) { setTimeout(function(){ map.setZoom(dz); }, 0); }

    // Verbindungs-Marker → navigieren die GANZE Seite zur Ziel-Karte
    markers.forEach(function(m){
      var icon = L.divIcon({ className:'eldara-pin', html:'<b>'+m.label+'</b>', iconSize:[0,0] });
      var mk = L.marker([m.y, m.x], { icon: icon, keyboard:false }).addTo(map);
      mk.on('click', function(){
        try { window.top.location.href = m.target; } catch(e) { window.location.href = m.target; }
      });
    });

    // Koordinaten-Picker:  <karte>.html?pick  → Klick zeigt [y, x] zum Feinjustieren
    if (/(?:^|[?&])pick(?:=|&|$)/.test(location.search)) {
      var box = document.getElementById('pick');
      box.style.display = 'block';
      box.textContent = 'Picker aktiv — auf Karte klicken';
      map.on('click', function(e){
        var y = Math.round(e.latlng.lat), x = Math.round(e.latlng.lng);
        box.textContent = 'y: ' + y + '   x: ' + x;
        if (navigator.clipboard) { try { navigator.clipboard.writeText('y:'+y+', x:'+x); } catch(_){} }
      });
    }
  })();
</script>
</body>
</html>
